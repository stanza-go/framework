version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - gocritic
    - misspell
    - unconvert
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (net/http.ResponseWriter).Write
        - (*github.com/stanza-go/framework/pkg/sqlite.Rows).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
      - path: pkg/sqlite/sqlite\.go
        linters:
          - gocritic
